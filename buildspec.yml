version: 0.2
env:
  variables:
    DBT_DATABASE: AwsDataCatalog
    DBT_SCHEMA: landing
    S3_STAGING_DIR: s3://amazon-s3-clima-project-442767638718-us-east-2-an/metadata/
    S3_DATA_DIR: s3://amazon-s3-clima-project-442767638718-us-east-2-an/tables/
    S3_DOCS_DIR: s3://www.climabr.com.br
    AWS_REGION: us-east-2
    
phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "=== INSTALL ==="      
      - python --version
      - pip install --upgrade pip
      - pip install poetry
      - poetry --version
      - poetry install --no-interaction --no-root
      

  pre_build:
      commands:
        - pwd
        - ls -la
        - find . -maxdepth 2 -type d
        - mkdir -p ~/.dbt
        - echo "-- PRE-BUILD --"      
        - echo "Gerando profiles.yml para produção"
        - |
          cat > ~/.dbt/profiles.yml <<EOF
          climabr:
            target: prod
            outputs:
              prod:
                type: athena
                database: ${DBT_DATABASE}
                region_name: ${AWS_REGION}
                schema: ${DBT_SCHEMA}
                s3_staging_dir: ${S3_STAGING_DIR}
                s3_data_dir: ${S3_DATA_DIR}
                threads: 4
          EOF
        - echo "Validando profile dbt..."
        - cat ~/.dbt/profiles.yml
        #- cd climabr && poetry run dbt debug          
  build:
    commands:
        - echo "=== BUILD ==="
        - cd climabr 
        - poetry run dbt --version
        - poetry run dbt build
        - poetry run dbt docs generate 
        - test -f target/index.html
        - rm -f merge_docs.py target/index_inline.html
        
        - echo "Criando script de unificação robusto com replace puro..."
        - |
          cat > merge_docs.py << 'EOF'
          import os
          import json

          target_dir = os.path.join(os.environ['CODEBUILD_SRC_DIR'], 'climabr', 'target')
          
          print("Lendo arquivos do dbt...")
          with open(os.path.join(target_dir, "index.html"), "r", encoding="utf-8") as f:
              html = f.read()
          with open(os.path.join(target_dir, "manifest.json"), "r", encoding="utf-8") as f:
              manifest = json.load(f)
          with open(os.path.join(target_dir, "catalog.json"), "r", encoding="utf-8") as f:
              catalog = json.load(f)

          print("Convertendo JSONs para texto...")
          manifest_json_str = json.dumps(manifest)
          catalog_json_str = json.dumps(catalog)

          print("Injetando dados via replace (seguro contra escapes)...")
          
          # Tentativa 1: Caso o dbt use var ou let com espaços padrão
          html = html.replace('OAG_MANIFEST = undefined;', f'OAG_MANIFEST = {manifest_json_str};')
          html = html.replace('OAG_CATALOG = undefined;', f'OAG_CATALOG = {catalog_json_str};')
          
          # Tentativa 2: Caso o dbt gere sem espaços (OAG_MANIFEST=undefined;)
          html = html.replace('OAG_MANIFEST=undefined;', f'OAG_MANIFEST={manifest_json_str};')
          html = html.replace('OAG_CATALOG=undefined;', f'OAG_CATALOG={catalog_json_str};')

          print("Gravando arquivo index_inline.html...")
          with open(os.path.join(target_dir, "index_inline.html"), "w", encoding="utf-8") as f:
              f.write(html)
          print("Arquivo index_inline.html gerado com sucesso!")
          EOF
        
               
        # Executa o script que acabamos de criar
        - python merge_docs.py
        - echo "Adicionando data de atualização no HTML..."
        - |
          BUILD_DATE=$(TZ=America/Sao_Paulo date +"%d/%m/%Y às %H:%M")  
          sed -i "/<\/body>/i <p style='text-align:center;font-size:14px;'>Última atualização em: ${BUILD_DATE}</p>" target/index_inline.html

  post_build:
    commands:
        - echo "=== POST-BUILD ==="
        - echo "Copiando para ${S3_DOCS_DIR}..."
        - aws s3 sync target/ ${S3_DOCS_DIR} --delete --content-type "application/json" --exclude "index.html" 
        - aws s3 cp target/index.html ${S3_DOCS_DIR}/index.html --content-type "text/html" 
artifacts:
  files:
    - target/**/*
    - logs/**/*
  discard-paths: no
cache:
  paths:
    - 'root/.cache/pip/**/*'          
    - 'root/.cache/pypoetry/**/*'
  